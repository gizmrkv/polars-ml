[project]
name = "polars-ml"
version = "0.1.0"
description = "Add your description here"
authors = [
    { name = "gizmrkv", email = "gizmrkv@gmail.com" }
]
dependencies = [
    "polars>=1.19.0",
    "lightgbm>=4.5.0",
    "catboost>=1.2.7",
    "xgboost>=2.1.3",
    "pyarrow>=18.1.0",
    "scikit-learn>=1.6.0",
    "scipy>=1.15.0",
    "cmaes>=0.11.1",
    "optuna>=4.1.0",
    "joblib>=1.4.2",
    "matplotlib>=3.10.0",
    "seaborn>=0.13.2",
    "tqdm>=4.67.1",
    "torch>=2.5.1",
    "lightning>=2.5.0.post0",
]
readme = "README.md"
requires-python = ">= 3.8"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.rye]
managed = true
dev-dependencies = [
    "pytest>=8.3.4",
    "ipykernel>=6.29.5",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/polars_ml"]
