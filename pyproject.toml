[project]
name = "polars-ml"
version = "0.1.0"
description = "Add your description here"
authors = [
    { name = "gizmrkv", email = "gizmrkv@gmail.com" }
]
dependencies = [
    "polars>=1.19.0",
    "pyarrow>=19.0.0",
]
readme = "README.md"
requires-python = ">= 3.8"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.rye]
managed = true
dev-dependencies = [
    "pytest>=8.3.4",
    "ipykernel>=6.29.5",
    "kaggle>=1.7.4.2",
    "statsmodels>=0.14.4",
    "prophet>=1.1.6",
    "optunahub>=0.1.0",
    "optuna-dashboard>=0.17.0",
    "pycountry>=24.6.1",
    "loguru>=0.7.3",
    "torchvision>=0.21.0",
    "tensorboard>=2.18.0",
    "tensorboardx>=2.6.2.2",
    "schedulefree>=1.4.1",
    "umap-learn>=0.5.7",
    "altair>=5.5.0",
    "great-tables>=0.16.1",
    "huggingface-hub>=0.29.1",
    "llama-cpp-python>=0.3.7",
    "transformers>=4.50.0",
    "svgwrite>=1.4.3",
    "sentencepiece>=0.2.0",
    "torch>=2.5.1",
    "lightning>=2.5.1",
    "deap>=1.4.2",
    "openfe>=0.0.12",
    "more-itertools>=10.6.0",
    "polars-ds>=0.8.0",
    "optuna-integration>=4.2.1",
    "lightgbm>=4.5.0",
    "catboost>=1.2.7",
    "xgboost>=2.1.3",
    "scipy>=1.15.1",
    "cmaes>=0.11.1",
    "optuna>=4.1.0",
    "joblib>=1.4.2",
    "matplotlib>=3.10.0",
    "seaborn>=0.13.2",
    "scikit-learn>=1.6.1",
    "tqdm>=4.67.1",
    "pytorch-tabular>=1.1.1",
    "pandas>=2.2.3",
    "torchaudio>=2.6.0",
    "soundfile>=0.13.1",
    "librosa>=0.11.0",
    "timm>=1.0.15",
    "pillow>=11.1.0",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/polars_ml"]

[tool.ruff]
extend-include = ["*.ipynb"]

[tool.ruff.lint]
ignore = ["F401"]
