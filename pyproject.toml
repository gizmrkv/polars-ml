[project]
name = "polars-ml"
version = "0.1.0"
description = "Add your description here"
authors = [
    { name = "gizmrkv", email = "gizmrkv@gmail.com" }
]
dependencies = [
    "polars>=1.19.0",
    "lightgbm>=4.5.0",
    "catboost>=1.2.7",
    "xgboost>=2.1.3",
    "pyarrow>=19.0.0",
    "scikit-learn>=1.6.1",
    "scipy>=1.15.1",
    "cmaes>=0.11.1",
    "optuna>=4.1.0",
    "joblib>=1.4.2",
    "matplotlib>=3.10.0",
    "seaborn>=0.13.2",
    "tqdm>=4.67.1",
    "torch>=2.5.1",
    "lightning>=2.5.0.post0",
    "deap>=1.4.2",
    "openfe>=0.0.12",
    "more-itertools>=10.6.0",
    "polars-ds>=0.8.0",
]
readme = "README.md"
requires-python = ">= 3.8"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.rye]
managed = true
dev-dependencies = [
    "pytest>=8.3.4",
    "ipykernel>=6.29.5",
    "kaggle>=1.6.17",
    "statsmodels>=0.14.4",
    "prophet>=1.1.6",
    "optunahub>=0.1.0",
    "optuna-dashboard>=0.17.0",
    "pycountry>=24.6.1",
    "loguru>=0.7.3",
    "torchvision>=0.21.0",
    "tensorboard>=2.18.0",
    "tensorboardx>=2.6.2.2",
    "schedulefree>=1.4",
    "umap-learn>=0.5.7",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/polars_ml"]

[tool.ruff]
extend-include = ["*.ipynb"]

[tool.ruff.lint]
ignore = ["F401"]
